<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levantamiento Técnico</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sales-app">
        <header class="sales-header">
            <h1>Levantamiento de Requerimientos</h1>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <p id="stepIndicator">Paso 1 de 7</p>
        </header>

        <form id="salesForm" name="Formulario-Requerimientos-Tecnicos" method="POST" data-netlify="true" action="/">
            <input type="hidden" name="form-name" value="Formulario-Requerimientos-Tecnicos" />

            <section class="form-step active" data-step="1">
                <h2>1. Visión del Negocio</h2>
                <div class="input-group">
                    <label>Empresa / Cliente</label>
                    <input type="text" name="Nombre_de_la_Empresa" placeholder="Nombre legal" required>
                </div>
                <div class="input-group">
                    <label>Problema que resuelve (El "Dolor")</label>
                    <textarea name="Problema_Principal_a_Resolver" placeholder="¿Por qué necesitan este software?"></textarea>
                </div>
            </section>

            <section class="form-step" data-step="2">
                <h2>2. Ecosistema Digital</h2>
                <label class="label-main">Plataformas Requeridas</label>
                <div class="checkbox-grid">
                    <label class="check-card"><input type="checkbox" name="Plataforma_Web"> <span>Web App (Panel)</span></label>
                    <label class="check-card"><input type="checkbox" name="Plataforma_iOS"> <span>App iOS</span></label>
                    <label class="check-card"><input type="checkbox" name="Plataforma_Android"> <span>App Android</span></label>
                    <label class="check-card"><input type="checkbox" name="Plataforma_Desktop"> <span>Desktop (Win/Mac)</span></label>
                </div>
                <div class="input-group">
                    <label>¿Requiere modo Offline?</label>
                    <select name="Necesita_Modo_Offline">
                        <option value="No">No, requiere conexión</option>
                        <option value="Si">Sí, sincronización diferida</option>
                    </select>
                </div>
            </section>

            <section class="form-step" data-step="3">
                <h2>3. Usuarios y Roles</h2>
                <div class="input-group">
                    <label>Volumen Mensual Esperado</label>
                    <select name="Volumen_de_Usuarios">
                        <option value="Interno (1-50)">Interno (1-50 usuarios)</option>
                        <option value="Pyme (50-2000)">Escala Media (50-2000 usuarios)</option>
                        <option value="Masivo (2000+)">Escala Masiva (2000+ usuarios)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Roles de Usuario</label>
                    <input type="text" name="Roles_Definidos" placeholder="Ej: Admin, Vendedor, Cliente">
                </div>
            </section>

            <section class="form-step" data-step="4">
                <h2>4. Integraciones Externas</h2>
                <div class="input-group">
                    <label>Pasarelas de Pago</label>
                    <input type="text" name="Pasarelas_de_Pago_Requeridas" placeholder="Ej: Stripe, PayU">
                </div>
                <div class="input-group">
                    <label>APIs de Terceros</label>
                    <textarea name="APIs_y_Servicios_Externos" placeholder="Ej: WhatsApp, Maps, SAP"></textarea>
                </div>
            </section>

            <section class="form-step" data-step="5">
                <h2>5. Interfaz y Experiencia</h2>
                <div class="input-group">
                    <label>Estado del Diseño</label>
                    <select name="Estado_Actual_del_Diseño">
                        <option value="Solo Idea">Solo es una idea</option>
                        <option value="Wireframes">Tengo Wireframes</option>
                        <option value="Diseño Final">Tengo diseño en Figma</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Referencia Visual</label>
                    <input type="text" name="App_de_Referencia" placeholder="URL de ejemplo">
                </div>
            </section>

            <section class="form-step" data-step="6">
                <h2>6. Inversión y Tiempos</h2>
                <div class="input-group">
                    <label>Presupuesto Estimado (USD)</label>
                    <div class="currency-input">
                        <span class="currency-symbol">$</span>
                        <input type="number" name="Presupuesto_USD" placeholder="Monto total">
                    </div>
                </div>
                <div class="input-group">
                    <label>Tiempo de Entrega (Timeline)</label>
                    <input type="text" name="Tiempo_Estimado_Entrega" placeholder="Ej: 4 meses">
                </div>
            </section>

            <section class="form-step" data-step="7">
                <div class="success-preview">
                    <div class="check-icon">🚀</div>
                    <h2>Finalizar Levantamiento</h2>
                    <p>Los datos se enviarán al equipo de desarrollo.</p>
                </div>
            </section>

            <div class="form-navigation">
                <button type="button" id="prevBtn" class="btn-secondary" style="display:none;">Anterior</button>
                <button type="button" id="nextBtn" class="btn-primary">Siguiente</button>
                <button type="submit" id="submitBtn" class="btn-primary" style="display:none;">Enviar a Ingeniería</button>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
